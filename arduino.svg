<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" width="340" height="220">
  <!-- PCB Board -->
  <rect x="5" y="5" width="330" height="210" rx="8" fill="#1a5c1a" stroke="#2d8a2d" stroke-width="3"/>
  <!-- PCB grid lines -->
  <g stroke="#1d6b1d" stroke-width="0.5" opacity="0.5">
    <line x1="5" y1="25" x2="335" y2="25"/><line x1="5" y1="45" x2="335" y2="45"/>
    <line x1="5" y1="65" x2="335" y2="65"/><line x1="5" y1="85" x2="335" y2="85"/>
    <line x1="5" y1="105" x2="335" y2="105"/><line x1="5" y1="125" x2="335" y2="125"/>
    <line x1="5" y1="145" x2="335" y2="145"/><line x1="5" y1="165" x2="335" y2="165"/>
    <line x1="5" y1="185" x2="335" y2="185"/>
    <line x1="25" y1="5" x2="25" y2="215"/><line x1="55" y1="5" x2="55" y2="215"/>
    <line x1="85" y1="5" x2="85" y2="215"/><line x1="115" y1="5" x2="115" y2="215"/>
    <line x1="145" y1="5" x2="145" y2="215"/><line x1="175" y1="5" x2="175" y2="215"/>
    <line x1="205" y1="5" x2="205" y2="215"/><line x1="235" y1="5" x2="235" y2="215"/>
    <line x1="265" y1="5" x2="265" y2="215"/><line x1="295" y1="5" x2="295" y2="215"/>
    <line x1="325" y1="5" x2="325" y2="215"/>
  </g>

  <!-- Board outline copper -->
  <rect x="5" y="5" width="330" height="210" rx="8" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.4"/>

  <!-- USB Connector -->
  <rect x="5" y="80" width="28" height="40" rx="3" fill="#888" stroke="#555" stroke-width="1.5"/>
  <rect x="8" y="84" width="22" height="32" rx="2" fill="#444"/>
  <text x="19" y="103" fill="#aaa" font-size="5" text-anchor="middle" font-family="monospace">USB</text>

  <!-- Power jack -->
  <rect x="5" y="140" width="22" height="22" rx="3" fill="#333" stroke="#555" stroke-width="1.5"/>
  <circle cx="16" cy="151" r="7" fill="#222" stroke="#666" stroke-width="1"/>
  <circle cx="16" cy="151" r="3" fill="#111"/>

  <!-- ATmega328P chip -->
  <rect x="120" y="75" width="80" height="80" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <!-- Chip pin marks -->
  <circle cx="120" cy="115" r="3" fill="#333"/>
  <g fill="#555" font-size="4" font-family="monospace">
    <text x="160" y="93" text-anchor="middle" fill="#888">ATmega328P</text>
    <text x="160" y="103" text-anchor="middle" fill="#666">ARDUINO</text>
  </g>
  <!-- Chip legs left -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="115" y1="82" x2="120" y2="82"/>
    <line x1="115" y1="90" x2="120" y2="90"/>
    <line x1="115" y1="98" x2="120" y2="98"/>
    <line x1="115" y1="106" x2="120" y2="106"/>
    <line x1="115" y1="114" x2="120" y2="114"/>
    <line x1="115" y1="122" x2="120" y2="122"/>
    <line x1="115" y1="130" x2="120" y2="130"/>
    <line x1="115" y1="138" x2="120" y2="138"/>
  </g>
  <!-- Chip legs right -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="200" y1="82" x2="205" y2="82"/>
    <line x1="200" y1="90" x2="205" y2="90"/>
    <line x1="200" y1="98" x2="205" y2="98"/>
    <line x1="200" y1="106" x2="205" y2="106"/>
    <line x1="200" y1="114" x2="205" y2="114"/>
    <line x1="200" y1="122" x2="205" y2="122"/>
    <line x1="200" y1="130" x2="205" y2="130"/>
    <line x1="200" y1="138" x2="205" y2="138"/>
  </g>
  <!-- Chip legs top -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="128" y1="70" x2="128" y2="75"/>
    <line x1="140" y1="70" x2="140" y2="75"/>
    <line x1="152" y1="70" x2="152" y2="75"/>
    <line x1="164" y1="70" x2="164" y2="75"/>
    <line x1="176" y1="70" x2="176" y2="75"/>
    <line x1="188" y1="70" x2="188" y2="75"/>
  </g>
  <!-- Chip legs bottom -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="128" y1="155" x2="128" y2="160"/>
    <line x1="140" y1="155" x2="140" y2="160"/>
    <line x1="152" y1="155" x2="152" y2="160"/>
    <line x1="164" y1="155" x2="164" y2="160"/>
    <line x1="176" y1="155" x2="176" y2="160"/>
    <line x1="188" y1="155" x2="188" y2="160"/>
  </g>

  <!-- Crystal oscillator -->
  <rect x="220" y="90" width="24" height="12" rx="3" fill="#c8a000" stroke="#a07800" stroke-width="1"/>
  <text x="232" y="99" fill="#333" font-size="5" text-anchor="middle" font-family="monospace">16MHz</text>

  <!-- Small chip (ATmega16U2) -->
  <rect x="55" y="55" width="36" height="28" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="73" y="68" fill="#666" font-size="4" text-anchor="middle" font-family="monospace">16U2</text>

  <!-- Reset button -->
  <rect x="255" y="55" width="18" height="18" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="264" cy="64" r="6" fill="#cc3333" stroke="#aa2222" stroke-width="1"/>
  <text x="264" y="84" fill="#8a8" font-size="5" text-anchor="middle" font-family="monospace">RST</text>

  <!-- LEDs -->
  <circle cx="290" cy="60" r="4" fill="#22cc22" stroke="#119911" stroke-width="1"/>
  <text x="290" y="74" fill="#8a8" font-size="4" text-anchor="middle">ON</text>
  <circle cx="305" cy="60" r="4" fill="#ff8800" stroke="#cc6600" stroke-width="1"/>
  <text x="305" y="74" fill="#8a8" font-size="4" text-anchor="middle">TX</text>
  <circle cx="320" cy="60" r="4" fill="#ff8800" stroke="#cc6600" stroke-width="1"/>
  <text x="320" y="74" fill="#8a8" font-size="4" text-anchor="middle">RX</text>
  <circle cx="305" cy="45" r="4" fill="#ff8800" stroke="#cc6600" stroke-width="1"/>
  <text x="305" y="38" fill="#8a8" font-size="4" text-anchor="middle">L</text>

  <!-- Voltage regulator -->
  <rect x="55" y="160" width="20" height="28" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="65" y="178" fill="#666" font-size="4" text-anchor="middle" font-family="monospace">7805</text>

  <!-- DIGITAL PINS header top -->
  <rect x="58" y="8" width="220" height="14" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Digital pin holes -->
  <g fill="#111" stroke="#b8860b" stroke-width="0.5">
    <circle cx="65" cy="15" r="3"/><circle cx="77" cy="15" r="3"/><circle cx="89" cy="15" r="3"/>
    <circle cx="101" cy="15" r="3"/><circle cx="113" cy="15" r="3"/><circle cx="125" cy="15" r="3"/>
    <circle cx="137" cy="15" r="3"/><circle cx="149" cy="15" r="3"/><circle cx="161" cy="15" r="3"/>
    <circle cx="173" cy="15" r="3"/><circle cx="185" cy="15" r="3"/><circle cx="197" cy="15" r="3"/>
    <circle cx="209" cy="15" r="3"/><circle cx="221" cy="15" r="3"/>
  </g>
  <!-- Digital pin labels -->
  <g fill="#7aaa7a" font-size="4" font-family="monospace" text-anchor="middle">
    <text x="65" y="27">0</text><text x="77" y="27">1</text><text x="89" y="27">2</text>
    <text x="101" y="27">3</text><text x="113" y="27">4</text><text x="125" y="27">5</text>
    <text x="137" y="27">6</text><text x="149" y="27">7</text><text x="161" y="27">8</text>
    <text x="173" y="27">9</text><text x="185" y="27">10</text><text x="197" y="27">11</text>
    <text x="209" y="27">12</text><text x="221" y="27">13</text>
  </g>
  <text x="243" y="18" fill="#7aaa7a" font-size="5" font-family="monospace">DIGITAL</text>

  <!-- ANALOG PINS header bottom -->
  <rect x="58" y="198" width="180" height="14" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <g fill="#111" stroke="#b8860b" stroke-width="0.5">
    <circle cx="65" cy="205" r="3"/><circle cx="80" cy="205" r="3"/><circle cx="95" cy="205" r="3"/>
    <circle cx="110" cy="205" r="3"/><circle cx="125" cy="205" r="3"/><circle cx="140" cy="205" r="3"/>
  </g>
  <g fill="#58cc82" font-size="4" font-family="monospace" text-anchor="middle">
    <text x="65" y="196">A0</text><text x="80" y="196">A1</text><text x="95" y="196">A2</text>
    <text x="110" y="196">A3</text><text x="125" y="196">A4</text><text x="140" y="196">A5</text>
  </g>

  <!-- POWER PINS -->
  <rect x="245" y="198" width="85" height="14" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <g fill="#111" stroke="#b8860b" stroke-width="0.5">
    <circle cx="252" cy="205" r="3"/><circle cx="265" cy="205" r="3"/>
    <circle cx="278" cy="205" r="3"/><circle cx="291" cy="205" r="3"/><circle cx="304" cy="205" r="3"/>
  </g>
  <g font-size="4" font-family="monospace" text-anchor="middle">
    <text x="252" y="196" fill="#ff6b6b">5V</text>
    <text x="265" y="196" fill="#ffa500">3V3</text>
    <text x="278" y="196" fill="#aaa">GND</text>
    <text x="291" y="196" fill="#aaa">GND</text>
    <text x="304" y="196" fill="#ff6b6b">VIN</text>
  </g>

  <!-- Board label -->
  <text x="160" y="175" fill="#2d8a2d" font-size="9" text-anchor="middle" font-family="Arial" font-weight="bold" opacity="0.7">Arduino Uno</text>

  <!-- Mounting holes -->
  <circle cx="22" cy="22" r="5" fill="#0d3d0d" stroke="#2d8a2d" stroke-width="1.5"/>
  <circle cx="318" cy="22" r="5" fill="#0d3d0d" stroke="#2d8a2d" stroke-width="1.5"/>
  <circle cx="22" cy="198" r="5" fill="#0d3d0d" stroke="#2d8a2d" stroke-width="1.5"/>
</svg>
